name: Check
on:
  workflow_dispatch: null
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions: {}
jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Install dependencies
        uses: ./.github/actions/setup
      - run: pnpm lint
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Install dependencies
        uses: ./.github/actions/setup
      - run: pnpm codegen
      - name: Check source state
        run: git add packages/*/src && git diff-index --cached HEAD --exit-code
          packages/*/src
  types:
    name: Types
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Install dependencies
        uses: ./.github/actions/setup
      - run: pnpm codegen
      - run: pnpm build
      - run: pnpm check
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Install dependencies
        uses: ./.github/actions/setup
      - run: pnpm build
      - run: pnpm test
        env:
          NODE_OPTIONS: --max_old_space_size=8192
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - name: Install dependencies
        uses: ./.github/actions/setup
      - run: pnpm build
      - name: Run integration tests
        run: pnpm test:integration
        env:
          NODE_OPTIONS: --max_old_space_size=8192
  e2e:
    name: E2E (${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4, 5, 6, 7, 8]
        shardTotal: [8]
    steps:
      - uses: actions/checkout@v7
      - name: Install dependencies
        uses: ./.github/actions/setup
      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps
      - name: Build packages
        run: pnpm build:packages
      - name: Type-check E2E tests
        if: matrix.shardIndex == 1
        run: pnpm check:e2e
      - name: Run E2E tests
        run: pnpm exec playwright test --config e2e/playwright.config.ts --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
        env:
          SERVER_URL: http://localhost:4000
          DISCORD_CLIENT_ID: dummy-client-id
      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: e2e-results-${{ matrix.shardIndex }}
          path: e2e/results/
          retention-days: 7
      - name: Upload blob report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: e2e-blob-report-${{ matrix.shardIndex }}
          path: e2e/blob-report/
          retention-days: 1
  e2e-report:
    name: E2E Report
    if: ${{ !cancelled() }}
    needs: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - name: Install dependencies
        uses: ./.github/actions/setup
      - name: Download blob reports
        uses: actions/download-artifact@v8
        with:
          pattern: e2e-blob-report-*
          path: e2e/all-blob-reports
          merge-multiple: true
      - name: Merge reports
        run: pnpm exec playwright merge-reports --reporter=html ./e2e/all-blob-reports
      - name: Upload HTML report
        uses: actions/upload-artifact@v7
        with:
          name: e2e-report
          path: playwright-report/
          retention-days: 7
