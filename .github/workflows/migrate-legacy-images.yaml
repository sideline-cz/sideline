name: migrate-legacy-images

# One-off: copy the historical version-tagged app images from the pre-MajNet repo
# (ghcr.io/maxa-ondrej/sideline/<app>, public) into this org's packages
# (ghcr.io/sideline-cz/sideline/<app>) so MajNet's release backfill can record
# the full release history under sideline-cz. Copies by digest (crane cp), so the
# images are faithful. Safe to re-run (idempotent). Delete after use.

on:
  workflow_dispatch:

jobs:
  copy:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        app: [server, web, bot, docs, proxy]
    steps:
      - name: Install crane
        run: |
          cd /tmp
          curl -sL https://github.com/google/go-containerregistry/releases/download/v0.20.2/go-containerregistry_Linux_x86_64.tar.gz | tar xz crane
          sudo mv crane /usr/local/bin/crane
          crane version
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Copy version-tagged images
        run: |
          set -euo pipefail
          SRC="ghcr.io/maxa-ondrej/sideline/${{ matrix.app }}"
          DST="ghcr.io/sideline-cz/sideline/${{ matrix.app }}"
          n=0
          for tag in $(crane ls "$SRC" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V); do
            echo "::group::${{ matrix.app }}:$tag"
            crane cp "$SRC:$tag" "$DST:$tag"
            echo "::endgroup::"
            n=$((n+1))
          done
          echo "copied $n version tag(s) for ${{ matrix.app }}"
