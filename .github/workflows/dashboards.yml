name: Dashboards

on:
  pull_request:
    paths:
      - monitoring/dashboards/**
  push:
    branches:
      - main
    paths:
      - monitoring/dashboards/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - name: Validate JSON syntax
        run: |
          ERRORS=0
          for file in monitoring/dashboards/*.json; do
            if ! python3 -m json.tool "$file" > /dev/null 2>&1; then
              echo "::error file=$file::Invalid JSON syntax"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ $ERRORS -gt 0 ]; then
            echo "::error::$ERRORS dashboard(s) have invalid JSON"
            exit 1
          fi
          echo "All dashboard JSON files are syntactically valid"

      - name: Validate dashboard structure
        run: |
          ERRORS=0
          for file in monitoring/dashboards/*.json; do
            RESULT=$(python3 << PYEOF
          import json, sys

          with open("$file") as f:
              dashboard = json.load(f)

          errors = []
          data = dashboard.get("data", dashboard)

          if not data.get("title"):
              errors.append("missing 'data.title'")

          if not isinstance(data.get("widgets"), list):
              errors.append("missing or invalid 'data.widgets' (must be array)")

          if not isinstance(data.get("layout"), list):
              errors.append("missing or invalid 'data.layout' (must be array)")

          widgets = data.get("widgets", [])
          layout_ids = {item["i"] for item in data.get("layout", []) if "i" in item}
          widget_ids = {w["id"] for w in widgets if "id" in w}

          for wid in widget_ids - layout_ids:
              errors.append(f"widget '{wid}' has no layout entry")

          for lid in layout_ids - widget_ids:
              errors.append(f"layout entry '{lid}' has no matching widget")

          for w in widgets:
              if not w.get("query"):
                  errors.append(f"widget '{w.get('id', '?')}' has no query")
              elif not w["query"].get("queryType"):
                  errors.append(f"widget '{w.get('id', '?')}' has no queryType")

          if errors:
              for e in errors:
                  print(f"::error file=$file::{e}")
              sys.exit(1)
          else:
              print(f"OK: {data['title']} ({len(widgets)} widgets)")
          PYEOF
          )
            EXIT_CODE=$?
            echo "$RESULT"
            if [ $EXIT_CODE -ne 0 ]; then
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ $ERRORS -gt 0 ]; then
            echo "::error::$ERRORS dashboard(s) have structural issues"
            exit 1
          fi
          echo "All dashboards are structurally valid"

  sync:
    name: Sync to SigNoz
    if: github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - name: Sync dashboards
        env:
          SIGNOZ_ENDPOINT: ${{ secrets.SIGNOZ_ENDPOINT }}
          SIGNOZ_API_KEY: ${{ secrets.SIGNOZ_API_KEY }}
        run: |
          if [ -z "$SIGNOZ_ENDPOINT" ]; then
            echo "::error::SIGNOZ_ENDPOINT secret is not set"
            exit 1
          fi

          CURL_OPTS=(-s -S -H "Content-Type: application/json")
          if [ -n "$SIGNOZ_API_KEY" ]; then
            CURL_OPTS+=(-H "SIGNOZ-API-KEY: $SIGNOZ_API_KEY")
          fi

          echo "Fetching existing dashboards from SigNoz..."
          EXISTING=$(curl "${CURL_OPTS[@]}" "$SIGNOZ_ENDPOINT/api/v1/dashboards" 2>/dev/null || echo '{"data":[]}')

          ERRORS=0
          for file in monitoring/dashboards/*.json; do
            [ -f "$file" ] || continue

            TITLE=$(python3 -c "import json; d=json.load(open('$file')); print(d.get('data',{}).get('title',''))")
            echo ""
            echo "Processing: $TITLE ($(basename "$file"))"

            # Check if dashboard with this title already exists
            # Handle both correct (data.title) and broken (data.data.title) nesting
            DASHBOARD_ID=$(echo "$EXISTING" | python3 -c "
          import sys, json
          data = json.load(sys.stdin).get('data', [])
          title = '$TITLE'
          for d in data:
              dd = d.get('data', {})
              t = dd.get('title') or dd.get('data', {}).get('title', '')
              if t == title:
                  print(d.get('uuid', d.get('id', '')))
                  break
          " 2>/dev/null)

            # Build the payload — SigNoz expects the dashboard content directly (no wrapper)
            PAYLOAD=$(python3 -c "
          import json
          with open('$file') as f:
              d = json.load(f)
          # Files use { 'data': { title, widgets, ... } } format — extract the content
          content = d.get('data', d)
          print(json.dumps(content))
          ")

            if [ -n "$DASHBOARD_ID" ]; then
              echo "  Updating existing dashboard (id: $DASHBOARD_ID)"
              RESPONSE=$(curl "${CURL_OPTS[@]}" -X PUT "$SIGNOZ_ENDPOINT/api/v1/dashboards/$DASHBOARD_ID" -d "$PAYLOAD" 2>&1)
            else
              echo "  Creating new dashboard"
              RESPONSE=$(curl "${CURL_OPTS[@]}" -X POST "$SIGNOZ_ENDPOINT/api/v1/dashboards" -d "$PAYLOAD" 2>&1)
            fi

            # Check for errors
            if echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          if d.get('error') or d.get('code') in ('unauthenticated', 'error'):
              sys.exit(1)
          " 2>/dev/null; then
              echo "  OK"
            else
              ERROR_MSG=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print(d.get('error') or d.get('message') or 'unknown error')
          " 2>/dev/null || echo "$RESPONSE")
              echo "::error file=$file::Failed to sync: $ERROR_MSG"
              ERRORS=$((ERRORS + 1))
            fi
          done

          echo ""
          if [ $ERRORS -gt 0 ]; then
            echo "::error::$ERRORS dashboard(s) failed to sync"
            exit 1
          fi
          echo "All dashboards synced successfully"
