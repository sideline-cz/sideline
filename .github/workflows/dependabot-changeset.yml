name: Add changeset to Dependabot updates

on:
  pull_request_target:
    types: [opened, synchronize, labeled]

jobs:
  dependabot:
    name: Update Dependabot PR
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
          # PAT (not the default GITHUB_TOKEN) so the action's `git push` of the
          # changeset commit authenticates as a user with write access — pushing
          # as github-actions[bot] is denied (403).
          token: ${{ secrets.GH_PAT }}
      - name: Update PR
        uses: StafflinePeoplePlus/dependabot-changesets@v0.1.5
        with:
          owner: maxa-ondrej
          repo: sideline
          pr-number: ${{ github.event.pull_request.number }}
          token: ${{ secrets.GH_PAT }}
