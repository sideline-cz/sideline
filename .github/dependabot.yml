# yaml-language-server: $schema=https://json.schemastore.org/dependabot-2.0.json

version: 2

updates:
  # ------------------------------------------------------------------
  # GitHub Actions
  # ------------------------------------------------------------------
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "deps:"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"

  # ------------------------------------------------------------------
  # npm (pnpm workspaces — root + all workspace packages)
  # ------------------------------------------------------------------
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "deps:"
    open-pull-requests-limit: 10
    groups:
      # Astro core + integrations have coupled peer ranges (a major bump of
      # `astro` requires matching majors of `@astrojs/*`). Group them — and
      # explicitly opt majors in, since Dependabot excludes majors from
      # groups by default.
      astro:
        patterns:
          - "astro"
          - "@astrojs/*"
        update-types:
          - "minor"
          - "patch"
          - "major"
      npm:
        patterns:
          - "*"
    ignore:
      # Effect runtime packages are tightly version-coupled; update manually
      - dependency-name: "effect"
      - dependency-name: "@effect/platform"
      - dependency-name: "@effect/platform-node"
      - dependency-name: "@effect/platform-browser"
      - dependency-name: "@effect/rpc"
      - dependency-name: "@effect/rpc-http"
      - dependency-name: "@effect/sql"
      - dependency-name: "@effect/sql-pg"
      - dependency-name: "@effect/experimental"
      - dependency-name: "@effect/opentelemetry"
      - dependency-name: "@effect/schema"
      - dependency-name: "@effect/cluster"
      - dependency-name: "@effect/cluster-workflow"
      # TypeScript 6 promotes deprecated tsconfig options (baseUrl,
      # downlevelIteration, esModuleInterop=false) from warnings to errors
      # across 7+ tsconfigs. Remove this when the deprecation migration lands.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # react-day-picker v10 renamed the ClassNames API (removed `table` key,
      # restructured slot names). Remove this when calendar.tsx is migrated.
      - dependency-name: "react-day-picker"
        update-types: ["version-update:semver-major"]
      # dfx 1.0.13 regressed Discord client + Snowflake type inference
      # (auth.ts loses types on client.listMyGuilds, bot tests fail on
      # DiscordREST service keys). Patches aren't safe — update manually.
      - dependency-name: "dfx"
